name: testing function from star.js
on: [push]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Check code
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 22.x
            - name: Run star.js
              run: node star.js
